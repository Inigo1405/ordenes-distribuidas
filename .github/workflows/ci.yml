name: CI                  # Nombre del workflow
on: 
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  build-and-test:         # Nombre del Job
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: build all services
        run: docker compose build

      - name: Start services 
        run: |
          cp .env.example .env.dev
          docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Esperando a que los servicios jalen..."
            timeout 120 bash -c '
                until docker compose ps --format json | python3 -c "import sys,json; svcs=[json.loads(l) for l in sys.stdin]; bad=[s[\"Name\"] for s in svcs if s.get(\"Health\") not in (\"healthy\",\"\")]; print(\"Esperando:\",bad) or sys.exit(1) if bad else None"; do
                    sleep 5
                done
            '
            echo "Todos los servicios están saludables."

      - name: Run integration tests
        run: |
          chmod +x ./scripts/test.sh
          ./scripts/test.sh

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Cleanup
        if: always()
        run: |
          echo "Limpiando contenedores y volúmenes..."
          docker compose down -v
          
      - name: Linter check
        run: |
          echo "Ejecutando linters..."
          ruff check .
