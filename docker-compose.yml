version: "3.9"

services:
  # --- Base de datos ---
  postgres:
    container_name: DB_Inventory
    image: postgres:16-alpine
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      retries: 5


  postgres-notifications:
    container_name: DB_Notification
    image: postgres:16-alpine
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    environment:
      POSTGRES_USER: ${NOTIFICATION_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
    volumes:
      - pg_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_DB_USER} -d ${NOTIFICATION_DB_NAME}"]
      interval: 5s
      retries: 5


  api-gateway:
    container_name: api-gateway
    build: ./api-gateway
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy


  # --- Servicios del sistema ---
  writer-service:
    build: ./writer-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy


  inventory-service:
    container_name: inventory-service
    build: ./inventory-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy


  notification-service: 
    container_name: notification-service
    build: ./notification-service
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    depends_on:
      postgres-notifications:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy


  #  --- Caché de estado ---
  redis:
    image: redis:7-alpine
    restart: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5


  rabbitmq:
    container_name: rabbitmq
    image: rabbitmq:3.13-management
    env_file: ${ENV_FILE:-.env.dev}
    restart: on-failure
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    
volumes:
  pg_data:
  pg_notification_data:
  
  rabbitmq_data:
